# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve`. If you change this file, please restart the server process.

# Theme Settings
#
# Theme Settings
minimal_mistakes_skin    : "neon"

# Site Settings
locale                   : "en-US"
title                    : "Aida Perramon Malavez"
title_separator          : "|"
subtitle                 : "Infectious Disease Modeller · Postdoc at Erasmus MC"
name                     : "Aida Perramon Malavez"
description              : "Personal research portfolio — mathematical modelling, infectious diseases, and children's public health."
url                      : "https://aida-pm.github.io"
baseurl                  : ""
repository               : "aida-pm/aida-pm.github.io"
words_per_minute         : 200

# Site Author
author:
  name             : "Aida Perramon Malavez"
  avatar           : "/assets/images/bio-photo.jpg"
  bio              : "Physics Engineer turned infectious disease modeller. PhD from UPC Barcelona. Postdoc at Erasmus MC on real-world evidence. Occasional philosopher."
  location         : "Rotterdam, Netherlands"
  email            : "aida.perramon.m@gmail.com"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:aida.perramon.m@gmail.com"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/aidaperramon/"
    - label: "ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "https://orcid.org/0000-0002-6057-5127"

# Site Footer
footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/aidaperramon/"
    - label: "ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "https://orcid.org/0000-0002-6057-5127"

# Navigation — crea el archivo _data/navigation.yml con esto:
# (lo detallo abajo)

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - Gemfile
  - LICENSE
  - README
  - node_modules
  - package.json
  - package-lock.json

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/

paginate: 5
paginate_path: /page:num/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
